<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Baston Sunumu</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .slide {
            display: none;
            width: 800px;
            height: 500px;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .slide.active {
            display: flex;
        }

        h1 { color: #2c3e50; font-size: 2.2em; margin-bottom: 20px; }
        p { color: #555; font-size: 1.2em; line-height: 1.6; }

        /* Küçültülmüş Görsel */
        img {
            max-width: 350px; 
            max-height: 200px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .team-list {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .member-item {
            background: #e9ecef;
            padding: 15px 25px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="slide active">
        <h1>Akıllı Baston Projesi</h1>
        <img src="https://cdnuploads.aa.com.tr/uploads/PhotoGallery/2023/06/23/thumbs_b2_ead03aacd3d6fc15eca2041c83ad8efe.jpg">
        <p>Görme engelli bireyler için teknolojik çözüm.</p>
    </div>

    <div class="slide">
        <h1>Teknik Donanım</h1>
        <img src="https://imgrosetta.webtekno.com/file/569961/1200x675.jpg">
        <p>Ultrasonik sensörler ile engel tespiti.</p>
    </div>

    <div class="slide">
        <h1>Takım Arkadaşlarımız</h1>
        <div class="team-list">
            <div class="member-item">İsim Soyisim 1</div>
            <div class="member-item">İsim Soyisim 2</div>
            <div class="member-item">İsim Soyisim 3</div>
        </div>
    </div>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            } else if (e.key === "ArrowLeft") {
                slides[current].classList.remove('active');
                current = (current - 1 + slides.length) % slides.length;
                slides[current].classList.add('active');
            }
        });
    </script>

</body>
</html>
