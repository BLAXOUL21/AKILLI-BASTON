<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Baston İnteraktif Sunum</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f5f6fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Slayt Kapsayıcı */
        .presentation-wrapper {
            position: relative;
            width: 900px;
            height: 550px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .slide {
            display: none; /* Varsayılan olarak gizli */
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        p { color: #666; font-size: 1.2em; max-width: 700px; }

        /* Görsel Boyutlandırma */
        .slide-img {
            width: 450px; /* Görselleri küçülttüm */
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        /* Kontrol Butonları */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 62, 80, 0.7);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            z-index: 10;
        }

        .nav-btn:hover { background: var(--accent); }
        .prev { left: 20px; }
        .next { right: 20px; }

        .progress {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="presentation-wrapper">
    <button class="nav-btn prev" onclick="changeSlide(-1)">❮</button>
    <button class="nav-btn next" onclick="changeSlide(1)">❯</button>

    <div class="slide active">
        <h1>Akıllı Baston Projesi</h1>
        <img src="https://cdnuploads.aa.com.tr/uploads/Contents/2023/06/23/thumbs_b_c_252cbef2088a7cf68c471a4a6d5e7c0c.jpg?v=120814" class="slide-img">
        <p>Görme engelli bireyler için teknolojik bir rehber.</p>
        <div class="progress">1 / 3</div>
    </div>

    <div class="slide">
        <h1>Erişilebilirlik</h1>
        <img src="https://cdnuploads.aa.com.tr/uploads/PhotoGallery/2023/06/23/thumbs_b2_ead03aacd3d6fc15eca2041c83ad8efe.jpg" class="slide-img">
        <p>Günlük hayatta güvenli ve bağımsız hareket imkanı sağlar.</p>
        <div class="progress">2 / 3</div>
    </div>

    <div class="slide">
        <h1>Teknoloji ve Sensörler</h1>
        <img src="https://imgrosetta.webtekno.com/file/569961/1200x675.jpg" class="slide-img">
        <p>Ultrasonik sensörler ile engelleri milisaniyeler içinde algılar.</p>
        <div class="progress">3 / 3</div>
    </div>
</div>

<script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');

    function showSlide(index) {
        slides.forEach(slide => slide.classList.remove('active'));
        
        if (index >= slides.length) currentSlide = 0;
        else if (index < 0) currentSlide = slides.length - 1;
        else currentSlide = index;

        slides[currentSlide].classList.add('active');
    }

    function changeSlide(n) {
        showSlide(currentSlide + n);
    }

    // Klavye Ok Tuşları Kontrolü
    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") changeSlide(-1);
        else if (e.key === "ArrowRight") changeSlide(1);
    });
</script>

</body>
</html>
