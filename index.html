<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Baston - Teknik Detaylar</title>
    <style>
        :root {
            --dark-blue: #1a2a6c;
            --tech-blue: #00d2ff;
            --white: #ffffff;
            --gray: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark-blue), #b21f1f, #fdbb2d);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .presentation-card {
            width: 900px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
            height: 550px;
        }

        .image-side {
            flex: 1.2;
            background-image: url('https://imgrosetta.webtekno.com/file/569961/1200x675.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 0.9em;
            text-align: center;
        }

        .content-side {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            color: var(--dark-blue);
            font-size: 2.2em;
            margin-bottom: 10px;
            border-left: 5px solid var(--tech-blue);
            padding-left: 15px;
        }

        h2 {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .feature-list {
            list-style: none;
            padding: 0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            color: #444;
        }

        .feature-icon {
            width: 30px;
            height: 30px;
            background: var(--tech-blue);
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .footer-info {
            margin-top: auto;
            font-size: 0.8em;
            color: #999;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="presentation-card">
        <div class="image-side">
            <div class="image-overlay">Ultrasonik Sensör ve Engel Algılama Sistemi</div>
        </div>

        <div class="content-side">
            <h1>Teknik Donanım</h1>
            <h2>Akıllı Baston Çalışma Prensibi</h2>

            <ul class="feature-list">
                <li class="feature-item">
                    <div class="feature-icon">1</div>
                    Mesafe ölçümü yapan sensörler
                </li>
                <li class="feature-item">
                    <div class="feature-icon">2</div>
                    Hızlı veri işleme (Arduino)
                </li>
                <li class="feature-item">
                    <div class="feature-icon">3</div>
                    Anlık sesli/titreşimli geri bildirim
                </li>
                <li class="feature-item">
                    <div class="feature-icon">4</div>
                    Uzun ömürlü batarya desteği
                </li>
            </ul>

            <div class="footer-info">
                Proje Sunumu | Bölüm 3: Donanım Bileşenleri
            </div>
        </div>
    </div>

</body>
</html>
