<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Baston Sunumu</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a; /* Koyu arka plan */
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .slide-container {
            width: 850px;
            height: 550px;
            background-color: #ffffff;
            color: #333;
            border-radius: 15px;
            display: none; /* Varsayılan gizli */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .slide-container.active {
            display: flex; /* Sadece aktif olan görünür */
        }

        h1 { color: #2c3e50; font-size: 2.2em; margin-bottom: 10px; }
        p { font-size: 1.1em; line-height: 1.6; color: #555; max-width: 600px; }

        /* Küçük Görsel Ayarı */
        img {
            width: 350px; 
            height: auto;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .team-box {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .member {
            background: #f4f7f6;
            padding: 15px;
            border-radius: 8px;
            min-width: 150px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            color: #888;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <div class="slide-container active">
        <h1>Akıllı Baston Projesi</h1>
        <img src="https://cdnuploads.aa.com.tr/uploads/Contents/2023/06/23/thumbs_b_c_252cbef2088a7cf68c471a4a6d5e7c0c.jpg?v=120814">
        <p>Görme engelli bireylerin bağımsızlığını teknoloji ile destekliyoruz.</p>
    </div>

    <div class="slide-container">
        <h1>Teknik Donanım</h1>
        <img src="https://imgrosetta.webtekno.com/file/569961/1200x675.jpg">
        <p>Ultrasonik sensörler ve Arduino ile engelleri önceden fark eder.</p>
    </div>

    <div class="slide-container">
        <h1>Takım Üyeleri</h1>
        <div class="team-box">
            <div class="member"><b>Ad Soyad</b><br>Yazılım</div>
            <div class="member"><b>Ad Soyad</b><br>Donanım</div>
            <div class="member"><b>Ad Soyad</b><br>Tasarım</div>
        </div>
    </div>

    <div class="footer">Değiştirmek için sağ/sol ok tuşlarını kullanın.</div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide-container');

        document.addEventListener('keydown', function(event) {
            if (event.key === "ArrowRight") {
                // Sonraki slayt
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            } 
            else if (event.key === "ArrowLeft") {
                // Önceki slayt
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide - 1 + slides.length) % slides.length;
                slides[currentSlide].classList.add('active');
            }
        });
    </script>

</body>
</html>
